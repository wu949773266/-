<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>山渡户外 · 徒步俱乐部</title>
<style>
  /* ===== 重置与基础 ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f8faf8;
    color: #1e2e28;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ===== 头部区域 ===== */
  header {
    height: 85vh;
    background: linear-gradient(rgba(20, 40, 30, 0.3), rgba(10, 30, 20, 0.5)),
                url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b");
    background-size: cover;
    background-position: center 30%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 0 20px;
  }

  header h1 {
    font-size: clamp(40px, 15vw, 70px);
    font-weight: 600;
    letter-spacing: 2px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    margin: 0;
    line-height: 1.2;
  }

  header p {
    font-size: clamp(18px, 5vw, 24px);
    margin: 15px 0 25px;
    font-weight: 300;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
  }

  /* ===== 移动端大按钮 ===== */
  .btn {
    display: inline-block;
    padding: 18px 48px;
    background: #2f6f4f;
    color: white;
    font-size: 1.2rem;
    font-weight: 500;
    border-radius: 50px;
    box-shadow: 0 10px 25px rgba(30, 70, 40, 0.4);
    transition: all 0.2s ease;
    text-decoration: none;
    letter-spacing: 1px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active {
    transform: scale(0.97);
    background: #3d8c64;
  }

  /* ===== 通用区块 ===== */
  section {
    padding: 50px 16px;
  }

  .title {
    font-size: 2.2rem;
    text-align: center;
    margin-bottom: 40px;
    font-weight: 500;
    color: #1d3d2c;
    position: relative;
  }

  .title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px;
    background: #2f6f4f;
    margin: 15px auto 0;
    border-radius: 4px;
  }

  /* ===== 线路卡片 - 移动端优化 ===== */
  .routes {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 400px;
    margin: 0 auto;
  }

  .card-link {
    text-decoration: none;
    color: inherit;
    display: block;
    width: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  .card {
    background: white;
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    transition: all 0.2s ease;
    border: 1px solid rgba(0, 0, 0, 0.02);
  }

  .card:active {
    transform: scale(0.98);
    background: #f5faf7;
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .card-content {
    padding: 20px 18px 22px;
  }

  .card-content h3 {
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 10px;
    color: #1f4a2e;
  }

  .card-content p {
    font-size: 1rem;
    color: #2f4a3d;
    margin: 6px 0;
    line-height: 1.5;
  }

  .card-content p:last-child {
    margin-top: 12px;
    font-weight: 500;
    color: #2f6f4f;
    display: inline-block;
    background: #e7f3eb;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 0.95rem;
  }

  /* ===== 关于我们 - 手机卡片 ===== */
  .about {
    text-align: center;
    max-width: 400px;
    margin: 0 auto;
    font-size: 1.1rem;
    line-height: 1.9;
    background: white;
    padding: 40px 24px;
    border-radius: 32px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(47, 111, 79, 0.1);
  }

  .about p {
    margin: 24px 0;
  }

  .about p:first-child {
    margin-top: 0;
  }

  .about p:last-child {
    margin-bottom: 0;
  }

  /* ===== 联系方式 - 移动端大按钮列表 ===== */
  .contact {
    max-width: 400px;
    margin: 0 auto;
    background: white;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(47, 111, 79, 0.1);
  }

  .contact-link {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px 20px;
    text-decoration: none;
    color: #1e2e28;
    font-size: 1.2rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .contact-link:last-child {
    border-bottom: none;
  }

  .contact-link:active {
    background: #f0f7f2;
  }

  .contact-link::before {
    content: "▹";
    color: #2f6f4f;
    font-size: 1.8rem;
    margin-right: 12px;
  }

  /* ===== 底部固定导航栏 ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 20px; /* 底部留出安全区 */
    box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
    border-top: 1px solid rgba(0, 0, 0, 0.03);
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.95);
    z-index: 100;
  }

  .nav-item {
    text-decoration: none;
    color: #6b7f76;
    font-size: 0.9rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 12px;
    border-radius: 30px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .nav-item.active {
    color: #2f6f4f;
    font-weight: 500;
  }

  .nav-icon {
    font-size: 1.5rem;
  }

  /* 底部留出空间，不被导航栏挡住 */
  body {
    padding-bottom: 80px;
  }

  footer {
    display: none; /* 隐藏原来的底部，用导航栏替代 */
  }

  /* ===== 微信小程序兼容 ===== */
  button, a {
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
</style>
</head>
<body>

<!-- 头部区域 -->
<header>
  <h1>山渡户外</h1>
  <p>走山渡心 · 走进真正的山野</p>
  <a href="#routes-section" class="btn">查看徒步线路</a>
</header>

<!-- 热门线路 -->
<section id="routes-section">
  <div class="title">热门徒步</div>
  <div class="routes">
    
    <!-- 雨崩卡片 -->
    <a href="#" class="card-link" onclick="alert('雨崩徒步详情(演示)'); return false;">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="雨崩冰湖" loading="lazy">
        <div class="card-content">
          <h3>雨崩徒步</h3>
          <p>4天高原徒步 · 冰湖/神瀑/梅里雪山</p>
          <p>难度 ⭐⭐⭐</p>
        </div>
      </div>
    </a>
    
    <!-- 虎跳峡卡片 -->
    <a href="#" class="card-link" onclick="alert('虎跳峡徒步详情(演示)'); return false;">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=2070&auto=format&fit=crop"
             alt="山野徒步风景" loading="lazy">
        <div class="card-content">
          <h3>虎跳峡徒步</h3>
          <p>云南虎跳峡经典路线 · 1天轻徒步</p>
          <p>难度 ⭐⭐</p>
        </div>
      </div>
    </a>
    
    <!-- 南极洛卡片 -->
    <a href="#" class="card-link" onclick="alert('南极洛徒步详情(演示)'); return false;">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1496080174650-637e3f22fa03?q=80&w=1972&auto=format&fit=crop" alt="南极洛高山湖泊" loading="lazy">
        <div class="card-content">
          <h3>南极洛徒步</h3>
          <p>香格里拉秘境湖泊群 · 3天徒步</p>
          <p>难度 ⭐⭐⭐</p>
        </div>
      </div>
    </a>
  </div>
</section>

<!-- 关于山渡 -->
<section>
  <div class="title">关于山渡</div>
  <div class="about">
    <p>🏔️ 山渡户外 · 成立于丽江<br>专注高原徒步与山地旅行</p>
    <p>👣 累计带队 1000+ 人<br>最小 3 岁半 · 最大 69 岁</p>
    <p>✨ 我们相信<br>真正的旅行不是逃离城市<br>而是走进山野，也走回自己</p>
  </div>
</section>

<!-- 联系报名 - 手机大按钮 -->
<section>
  <div class="title">报名 / 联系</div>
  <div class="contact">
    <a href="#" class="contact-link" onclick="alert('微信号：SDHW008 (复制演示)'); return false;">微信：SDHW008</a>
    <a href="#" class="contact-link" onclick="alert('地址：丽江 · 束河古镇'); return false;">地址：丽江 · 束河古镇</a>
  </div>
</section>

<!-- 底部固定导航栏 (适合手机) -->
<div class="bottom-nav">
  <a href="#" class="nav-item active" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;">
    <span class="nav-icon">🏠</span>
    <span>首页</span>
  </a>
  <a href="#routes-section" class="nav-item" onclick="return false;">
    <span class="nav-icon">🥾</span>
    <span>线路</span>
  </a>
  <a href="#" class="nav-item" onclick="alert('联系客服：SDHW008'); return false;">
    <span class="nav-icon">💬</span>
    <span>联系</span>
  </a>
  <a href="#" class="nav-item" onclick="alert('关于我们'); return false;">
    <span class="nav-icon">📋</span>
    <span>关于</span>
  </a>
</div>

<script>
  // 简单的交互，让导航栏高亮
  (function() {
    // 给所有卡片添加点击反馈
    console.log('山渡户外移动版已加载');
    
    // 导航栏滚动高亮
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach((item, index) => {
      item.addEventListener('click', function(e) {
        navItems.forEach(nav => nav.classList.remove('active'));
        this.classList.add('active');
      });
    });
  })();
</script>

</body>
</html>
