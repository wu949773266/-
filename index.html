<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山渡户外 | 徒步俱乐部</title>
<style>
/* 重置与基础 */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5;
  color: #1e2e28;
  line-height: 1.5;
}

/* 头部 */
header {
  height: 90vh;
  background: linear-gradient(rgba(20, 40, 30, 0.3), rgba(10, 30, 20, 0.4)),
              url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b");
  background-size: cover;
  background-position: center 40%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 0 20px;
}

header h1 {
  font-size: clamp(48px, 12vw, 80px);
  font-weight: 600;
  letter-spacing: 4px;
  text-shadow: 0 4px 20px rgba(0, 20, 0, 0.5);
  margin: 0;
}

header p {
  font-size: clamp(18px, 4vw, 26px);
  margin: 20px 0 30px;
  font-weight: 300;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
}

/* 按钮 */
.btn {
  display: inline-block;
  padding: 16px 48px;
  border: none;
  background: #2f6f4f;
  color: white;
  font-size: 1.2rem;
  font-weight: 500;
  cursor: pointer;
  border-radius: 40px;
  box-shadow: 0 8px 20px rgba(30, 70, 40, 0.4);
  transition: all 0.25s ease;
  letter-spacing: 1.5px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  text-decoration: none;
}

.btn:hover {
  background: #3e8060;
  transform: translateY(-4px);
  box-shadow: 0 16px 28px rgba(30, 80, 40, 0.5);
}

.btn:active {
  transform: translateY(2px);
  box-shadow: 0 6px 12px rgba(20, 60, 30, 0.4);
}

/* 通用区块 */
section {
  padding: 80px 5%;
  max-width: 1300px;
  margin: 0 auto;
}

@media (min-width: 900px) {
  section {
    padding: 90px 8%;
  }
}

.title {
  font-size: 2.8rem;
  text-align: center;
  margin-bottom: 60px;
  font-weight: 400;
  letter-spacing: 2px;
  position: relative;
  color: #1d3d2c;
}

.title::after {
  content: '';
  display: block;
  width: 80px;
  height: 4px;
  background: #2f6f4f;
  margin: 20px auto 0;
  border-radius: 4px;
}

/* 线路卡片区域 */
.routes {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.card-link {
  text-decoration: none;
  color: inherit;
  display: block;
  width: 320px;
}

.card {
  background: white;
  width: 100%;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 15px 30px -8px rgba(20, 60, 30, 0.15);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card-link:hover .card {
  transform: translateY(-8px);
  box-shadow: 0 25px 35px -10px #1f4a33b3;
}

.card img {
  width: 100%;
  height: 210px;
  object-fit: cover;
  display: block;
  transition: transform 0.4s;
}

.card-link:hover img {
  transform: scale(1.02);
}

.card-content {
  padding: 24px 22px 28px;
}

.card-content h3 {
  font-size: 1.9rem;
  font-weight: 500;
  margin-bottom: 12px;
  color: #1f4a2e;
}

.card-content p {
  font-size: 1rem;
  color: #2f4a3d;
  margin: 8px 0;
  line-height: 1.5;
}

.card-content p:last-child {
  margin-top: 12px;
  font-weight: 500;
  color: #2f6f4f;
  letter-spacing: 0.3px;
  display: inline-block;
  background: #e7f3eb;
  padding: 4px 14px;
  border-radius: 30px;
  font-size: 0.9rem;
}

/* 关于我们 */
.about {
  text-align: center;
  max-width: 850px;
  margin: 0 auto;
  font-size: 1.25rem;
  line-height: 2;
  background: rgba(255, 255, 255, 0.7);
  padding: 40px 30px;
  border-radius: 48px 24px 48px 24px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
  backdrop-filter: blur(2px);
}

.about p {
  margin: 32px 0;
}

.about p:first-child {
  margin-top: 0;
}

.about p:last-child {
  margin-bottom: 0;
}

/* 联系方式 - 改为可点击链接 */
.contact {
  text-align: center;
  background: white;
  max-width: 500px;
  margin: 0 auto;
  padding: 40px 30px;
  border-radius: 36px;
  box-shadow: 0 15px 30px rgba(47, 111, 79, 0.12);
  font-size: 1.3rem;
  border: 1px solid rgba(80, 120, 100, 0.15);
}

.contact-link {
  text-decoration: none;
  color: inherit;
  display: block;
  transition: all 0.2s ease;
}

.contact-link:hover {
  color: #2f6f4f;
  transform: translateX(5px);
}

.contact p {
  margin: 22px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.contact p:first-child {
  margin-top: 0;
}
.contact p:last-child {
  margin-bottom: 0;
}

.contact p::before {
  content: "▹";
  color: #2f6f4f;
  font-size: 2rem;
  line-height: 1;
  font-weight: 300;
}

/* 页脚 */
footer {
  background: #1f3329;
  color: #dbefe2;
  text-align: center;
  padding: 36px 20px;
  font-size: 1.1rem;
  letter-spacing: 1.5px;
  border-top: 4px solid #3b8b62;
}

/* 手机优化 */
@media (max-width: 600px) {
  .title {
    font-size: 2.2rem;
  }
  .about {
    font-size: 1.1rem;
    padding: 30px 18px;
  }
  .contact {
    font-size: 1.15rem;
    padding: 30px 20px;
  }
  .btn {
    padding: 14px 36px;
    font-size: 1.1rem;
  }
  header h1 {
    font-size: 52px;
  }
}
</style>
</head>
<body>

<footer>

</html>
